{% extends "base.html" %}
{% block title %}Zmiana hasła — {{ app_name }}{% endblock %}
{% block page_heading %}Zmiana hasła{% endblock %}

{% block content %}
<div class="refined-page" style="max-width:520px;">
    <div class="page-header">
        <div>
            <h1 class="page-title">Zmiana hasła</h1>
            <p class="page-subtitle">{{ current_user.full_name }}</p>
        </div>
    </div>

    <div style="background:#fff;border:1px solid var(--color-border);border-radius:.75rem;padding:1.5rem;">
        <form method="POST" style="display:flex;flex-direction:column;gap:1rem;">
            <div>
                <label style="display:block;font-size:.8rem;font-weight:500;color:var(--color-ink-muted);margin-bottom:.3rem;">Aktualne hasło</label>
                <input type="password" name="old_password" required
                       style="width:100%;padding:.6rem .875rem;border:1px solid var(--color-border);border-radius:.5rem;font-size:.875rem;font-family:inherit;background:#fafafa;outline:none;">
            </div>
            <div>
                <label style="display:block;font-size:.8rem;font-weight:500;color:var(--color-ink-muted);margin-bottom:.3rem;">Nowe hasło</label>
                <input type="password" name="new_password" required minlength="8"
                       style="width:100%;padding:.6rem .875rem;border:1px solid var(--color-border);border-radius:.5rem;font-size:.875rem;font-family:inherit;background:#fafafa;outline:none;"
                       placeholder="min. 8 znaków">
            </div>
            <div>
                <label style="display:block;font-size:.8rem;font-weight:500;color:var(--color-ink-muted);margin-bottom:.3rem;">Potwierdź nowe hasło</label>
                <input type="password" name="confirm_password" required
                       style="width:100%;padding:.6rem .875rem;border:1px solid var(--color-border);border-radius:.5rem;font-size:.875rem;font-family:inherit;background:#fafafa;outline:none;">
            </div>
            <div style="display:flex;gap:.75rem;margin-top:.5rem;">
                <button type="submit"
                        style="padding:.65rem 1.25rem;background:var(--color-accent);color:#fff;border:none;border-radius:.5rem;font-size:.875rem;font-weight:500;cursor:pointer;">
                    Zmień hasło
                </button>
                <a href="{{ url_for('main.index') }}"
                   style="padding:.65rem 1rem;border:1px solid var(--color-border);border-radius:.5rem;font-size:.875rem;color:var(--color-ink-muted);text-decoration:none;">
                    Anuluj
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
