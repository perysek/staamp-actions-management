<!DOCTYPE html>
<html lang="pl" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nowe hasło — {{ app_name }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/output.css') }}">
    <style>
        :root { --color-accent:#c9a227; --color-border:#e8e6e1; --color-ink:#1a1a1a; --color-ink-muted:#525252; --color-ink-subtle:#8a8a8a; --color-surface-warm:#f7f6f3; }
        *, *::before, *::after { box-sizing: border-box; }
        html { zoom: 1.4; }
        html, body { height: 100%; margin: 0; font-family: 'Inter', sans-serif; background: var(--color-surface-warm); color: var(--color-ink); font-size: .875rem; }
        .card { background: #fff; border: 1px solid var(--color-border); border-radius: 1rem; padding: 2rem; box-shadow: 0 4px 24px rgba(0,0,0,.06); }
        label { display: block; font-size: .8rem; font-weight: 500; color: var(--color-ink-muted); margin-bottom: .35rem; }
        input[type=password] { width: 100%; padding: .625rem .875rem; border: 1px solid var(--color-border); border-radius: .5rem; font-size: .875rem; font-family: inherit; background: #fafafa; outline: none; transition: border-color .15s; }
        input[type=password]:focus { border-color: var(--color-accent); box-shadow: 0 0 0 3px rgba(201,162,39,.15); }
        .btn-primary { padding: .65rem 1.25rem; background: var(--color-accent); color: #fff; border: none; border-radius: .5rem; font-size: .875rem; font-weight: 500; cursor: pointer; font-family: inherit; }
        .flash { display: flex; align-items: center; gap: .5rem; padding: .625rem .875rem; border-radius: .5rem; font-size: .8rem; border: 1px solid; margin-bottom: 1rem; }
        .flash-error { background: #fdf3f3; border-color: #f0c8c8; color: #9b2c2c; }
    </style>
</head>
<body class="h-full flex items-center justify-center">
<div style="max-width:400px;width:100%;margin:0 1rem;">
    <div style="text-align:center;margin-bottom:1.5rem;">
        <span class="material-icons" style="color:var(--color-accent);font-size:28px;">lock_reset</span>
        <div style="font-size:1.1rem;font-weight:600;margin-top:.4rem;">Ustaw nowe hasło</div>
    </div>

    <div class="card">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
            <div class="flash flash-{{ category }}">
                <span class="material-icons" style="font-size:16px;">error</span>
                {{ message }}
            </div>
            {% endfor %}
        {% endwith %}

        <form method="POST" style="display:flex;flex-direction:column;gap:1rem;">
            <div>
                <label for="new_password">Nowe hasło</label>
                <input type="password" id="new_password" name="new_password" required minlength="8"
                       autofocus placeholder="min. 8 znaków">
            </div>
            <div>
                <label for="confirm_password">Potwierdź hasło</label>
                <input type="password" id="confirm_password" name="confirm_password" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn-primary">Zmień hasło</button>
        </form>
    </div>
</div>
</body>
</html>
